apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: pharma
  namespace: argocd
spec:
  description: Pharma microservices project

  sourceRepos:
    # Replace <YOUR_GITHUB_USERNAME> with your GitHub username after forking zen-gitops
    - "https://github.com/<YOUR_GITHUB_USERNAME>/zen-gitops.git"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: dev
    - server: https://kubernetes.default.svc
      namespace: qa
    - server: https://kubernetes.default.svc
      namespace: prod
    - server: https://kubernetes.default.svc
      namespace: argocd

  # Wide for lab environment — restrict to specific resource kinds in production
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # warn: true surfaces resources created outside GitOps — useful for learning
  orphanedResources:
    warn: true

  roles:
    - name: pharma-admin
      description: Admin role for pharma project
      policies:
        - p, proj:pharma:pharma-admin, applications, *, pharma/*, allow
      groups:
        # Requires OIDC/SSO configured — this group assignment is inert in a local lab
        - pharma-devops-team
